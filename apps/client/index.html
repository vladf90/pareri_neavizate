<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watchalong Graphics</title>
    
    <!-- Preload fonts to prevent FOUC (Flash of Unstyled Content) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&family=Montserrat:wght@400;500;600;700;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Prevent animation flicker -->
    <style>
      /* Ensure animations don't flicker on load */
      * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* GPU acceleration for animations */
      .animate-slideInLeft,
      .animate-slideInRight,
      .animate-slideInUp,
      .animate-fadeIn,
      .animate-scaleIn,
      .animate-rowSlideIn,
      .ticker-track,
      .row-slide-in {
        will-change: transform, opacity;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
